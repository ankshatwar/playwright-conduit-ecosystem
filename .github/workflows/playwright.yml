name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  docker-container-test:
    name: Execute via Docker Container
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Architecture
      uses: actions/checkout@v4

    # Build local image using optimized Dockerfile context
    - name: Build Automated Suite Image
      run: |
        docker build -t playwright-portfolio-suite .

    # Run the suite while securely mapping github secrets into the container at runtime
    - name: Execute Tests Containerized
      env:
        BASE_URL: ${{ vars.BASE_URL }}
        API_URL: ${{ vars.API_URL }}
        CONDUIT_EMAIL: ${{ secrets.CONDUIT_EMAIL }}
        CONDUIT_PASSWORD: ${{ secrets.CONDUIT_PASSWORD }}
      run: |
        docker run --rm \
          --ipc=host \
          -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
          -e CI=true \
          -e BASE_URL="$BASE_URL" \
          -e API_URL="$API_URL" \
          -e CONDUIT_EMAIL="$CONDUIT_EMAIL" \
          -e CONDUIT_PASSWORD="$CONDUIT_PASSWORD" \
          -e READER_EMAIL="$READER_EMAIL" \
          -e READER_PASSWORD="$READER_PASSWORD" \
          playwright-portfolio-suite

    # Store test execution artifacts for easy reporting evaluation
    - name: Upload Test Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30